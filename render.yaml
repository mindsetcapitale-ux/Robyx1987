services:
  - type: web
    name: jarvis-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn crypto_dashboard:app --bind 0.0.0.0:$PORT

  - type: worker
    name: jarvis-scheduler
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python jarvis_scheduler.py